<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LooZ — כניסה</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/dist/auth.css" />

  <!-- keep your existing logic -->
  <script>
    (function () {
      function load(p,f){var s=document.createElement('script');s.src=p;s.defer=true;
        s.onerror=function(){var t=document.createElement('script');t.src=f;t.defer=true;document.head.appendChild(t);};
        document.head.appendChild(s);}
      load('js/auth.js','./auth.js');
    })();
  </script>
</head>
<body>

<main class="shell">
  <section class="card" aria-label="טופס כניסה">

    <!-- top bar: ICONS ONLY -->
    <header class="topbar">
      <!-- REGISTER (left) -->
      <a class="iconbtn" data-go="register" aria-label="הרשמה" title="הרשמה">
        <!-- person-plus -->
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <circle cx="9" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M2.8 20a6.8 6.8 0 0 1 12.4 0" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M18 7v6M15 10h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </a>

      <h1 class="title">כניסה</h1>

      <!-- FORGOT (right) -->
      <a class="iconbtn" data-go="forgot" aria-label="שכחתי סיסמה" title="שכחתי סיסמה">
        <!-- key/help -->
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <circle cx="10" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M3 21l5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="18" cy="17" r="1.4" fill="currentColor"/>
          <path d="M12 10a2 2 0 0 1 2-2 2 2 0 0 1 1.3.5c.5.4.7.9.7 1.5 0 1.2-1 1.6-1.6 2.1-.5.4-.7.7-.7 1.4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </a>
    </header>

    <!-- LOGIN -->
    <section class="panel is-on" data-panel="login" aria-label="כניסה">
      <form id="formLogin" class="f" novalidate>
        <label class="f__label">אימייל</label>
        <div class="input">
          <span class="input__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 7l8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <input class="input__el" type="email" name="email" placeholder="name@email.com" autocomplete="email">
          <!-- space-reserver at end (no icon here for email) -->
          <span class="input__tail" aria-hidden="true"></span>
        </div>

        <label class="f__label">סיסמה</label>
        <div class="input">
          <span class="input__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><rect x="5" y="11" width="14" height="9" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 11V8a4 4 0 1 1 8 0v3" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <input class="input__el" type="password" name="password" placeholder="••••••••" autocomplete="current-password">
          <button class="input__eye eye" type="button" aria-label="הצג/הסתר">👁</button>
        </div>

        <button class="btn" type="submit">
          <span class="btn__shine"></span> התחבר
        </button>

        <p class="muted">אין לך חשבון? <a class="link" href="#" data-go="register">הירשמי/הירשם כאן</a></p>

        <!-- round, colorful providers -->
        <div class="providers" aria-label="התחברות מהירה">
          <button type="button" class="pbtn pbtn--google"    data-provider="google"    aria-label="Google"></button>
          <button type="button" class="pbtn pbtn--facebook"  data-provider="facebook"  aria-label="Facebook"></button>
          <button type="button" class="pbtn pbtn--instagram" data-provider="instagram" aria-label="Instagram"></button>
          <button type="button" class="pbtn pbtn--apple"     data-provider="apple"     aria-label="Apple"></button>
        </div>
      </form>
    </section>

    <!-- REGISTER -->
    <section class="panel" data-panel="register" aria-label="הרשמה">
      <form id="formRegister" class="f" novalidate>
        <label class="f__label">שם מלא</label>
        <div class="input">
          <span class="input__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M5 20a7 7 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <input class="input__el" type="text" name="name" placeholder="דניאלה לוי" autocomplete="name">
          <span class="input__tail" aria-hidden="true"></span>
        </div>

        <label class="f__label">אימייל</label>
        <div class="input">
          <span class="input__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 7l8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <input class="input__el" type="email" name="email" placeholder="name@email.com" autocomplete="email">
          <span class="input__tail" aria-hidden="true"></span>
        </div>

        <label class="f__label">סיסמה</label>
        <div class="input">
          <span class="input__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><rect x="5" y="11" width="14" height="9" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 11V8a4 4 0 1 1 8 0v3" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <input class="input__el" type="password" name="password" placeholder="••••••••" autocomplete="new-password">
          <button class="input__eye eye" type="button" aria-label="הצג/הסתר">👁</button>
        </div>

        <label class="f__label">אימות סיסמה</label>
        <div class="input">
          <span class="input__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><rect x="5" y="11" width="14" height="9" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <input class="input__el" type="password" name="confirm" placeholder="••••••••" autocomplete="new-password">
          <button class="input__eye eye" type="button" aria-label="הצג/הסתר">👁</button>
        </div>

        <button class="btn" type="submit"><span class="btn__shine"></span> צור חשבון</button>
        <p class="muted">כבר יש לך חשבון? <a class="link" href="#" data-go="login">כניסה כאן</a></p>
      </form>
    </section>

    <!-- FORGOT -->
    <section class="panel" data-panel="forgot" aria-label="שכחתי סיסמה">
      <form id="formForgot" class="f" novalidate>
        <p class="muted">הכנס/י אימייל לקבלת קישור לאיפוס</p>
        <div class="input">
          <span class="input__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 7l8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <input class="input__el" type="email" name="email" placeholder="name@email.com">
          <span class="input__tail" aria-hidden="true"></span>
        </div>
        <button class="btn" type="submit"><span class="btn__shine"></span> שלח קישור</button>
        <p class="muted"><a class="link" href="#" data-go="login">חזרה לכניסה</a></p>
      </form>
    </section>

  </section>
</main>

<script src="js/logo.js"></script>
<script src="js/auth-ui.js?v=2"></script>
</body>
</html>
