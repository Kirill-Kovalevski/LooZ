<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LooZ — כניסה / הרשמה</title>

  <!-- Reuse your Settings styles & theme so header is identical -->
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/dist/settings.css" />
  <link rel="stylesheet" href="css/dist/auth.css" />
  <link rel="stylesheet" href="css/dist/dark-overrides.css" />



  <!-- Robust loader: tries /js/auth.js then falls back to ./auth.js -->
<script>
  (function () {
    function load(primary, fallback) {
      var s = document.createElement('script');
      s.src = primary; s.defer = true;
      s.onerror = function () {
        var f = document.createElement('script');
        f.src = fallback; f.defer = true;
        document.head.appendChild(f);
      };
      document.head.appendChild(s);
    }
    load('js/auth.js', './auth.js');
  })();
</script>

</head>
<body>
  <main class="s">
    <!-- Same header DOM/classes as Settings -->
    <header class="s__header s__header--grid">
      <a class="s__btn s__btn--gold s__btn--chev" href="index.html" aria-label="חזרה">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M14 5L7 12l7 7" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <h1 class="s__title s__title--center">כניסה</h1>
      <a class="looz-logo" href="index.html" aria-label="LooZ">
        <img class="brand-logo brand-logo--light" src="icons/main-logo.png" alt="LooZ" />
        <img class="brand-logo brand-logo--dark"  src="icons/dark-logo.png"  alt="LooZ" />
      </a>
    </header>

    <section class="auth">
      <!-- Tabs -->
      <nav class="auth__tabs" role="tablist" aria-label="Auth tabs">
        <button class="auth__tab is-on" data-tab="login" role="tab" aria-selected="true">כניסה</button>
        <button class="auth__tab" data-tab="register" role="tab" aria-selected="false">הרשמה</button>
        <button class="auth__tab" data-tab="forgot" role="tab" aria-selected="false">שכחתי סיסמה</button>
      </nav>

      <!-- Panels -->
      <section class="auth__panel is-on" data-panel="login" role="tabpanel">
        <form id="formLogin" class="auth__card" autocomplete="on">
          <div class="field">
            <span class="ic">@</span>
            <input type="email" name="email" placeholder="כתובת אימייל" required>
          </div>
          <div class="field">
            <span class="ic">🔒</span>
            <input type="password" name="password" placeholder="סיסמה" minlength="6" required>
            <button type="button" class="eye" aria-label="הצג/הסתר סיסמה">👁️</button>
          </div>
          <label class="remember">
            <input type="checkbox" name="remember"> זכור אותי
          </label>
          <button class="btn btn--primary" type="submit">התחבר</button>
          <p class="small">
            אין לך חשבון? <a href="#" data-go="register">הירשם/י כאן</a>
          </p>
        </form>
      </section>

      <section class="auth__panel" data-panel="register" role="tabpanel" hidden>
        <form id="formRegister" class="auth__card" autocomplete="on">
          <div class="field">
            <span class="ic">🪪</span>
            <input type="text" name="name" placeholder="שם מלא" required>
          </div>
          <div class="field">
            <span class="ic">@</span>
            <input type="email" name="email" placeholder="כתובת אימייל" required>
          </div>
          <div class="field">
            <span class="ic">🔒</span>
            <input type="password" name="password" placeholder="סיסמה (מינ׳ 6 תווים)" minlength="6" required>
            <button type="button" class="eye" aria-label="הצג/הסתר סיסמה">👁️</button>
          </div>
          <div class="field">
            <span class="ic">🔒</span>
            <input type="password" name="confirm" placeholder="אימות סיסמה" minlength="6" required>
            <button type="button" class="eye" aria-label="הצג/הסתר סיסמה">👁️</button>
          </div>
          <button class="btn btn--primary" type="submit">צור חשבון</button>
          <p class="small">
            כבר יש חשבון? <a href="#" data-go="login">כניסה</a>
          </p>
        </form>
      </section>

      <section class="auth__panel" data-panel="forgot" role="tabpanel" hidden>
        <form id="formForgot" class="auth__card">
          <div class="field">
            <span class="ic">@</span>
            <input type="email" name="email" placeholder="כתובת אימייל" required>
          </div>
          <button class="btn btn--primary" type="submit">שלח קישור לאיפוס</button>
          <p class="small">
            זוכרת/זוכר את הסיסמה? <a href="#" data-go="login">חזרה לכניסה</a>
          </p>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
