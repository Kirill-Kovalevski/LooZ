<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LooZ</title>

  <!-- Apply saved theme before paint (prevents flash) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <!-- Theme + base (your existing JS) -->
  <script src="js/theme.js"></script>
  <script>
    (function () {
      if (/github\.io$/.test(location.hostname)) {
        var seg = (location.pathname.split('/').filter(Boolean)[0] || '');
        var base = '/' + (seg ? seg + '/' : '');
        var el = document.createElement('base'); el.href = base;
        document.head.appendChild(el);
      }
    })();
  </script>

  <!-- Your base styles -->
  <link rel="stylesheet" href="css/dist/main.css" />
  <link rel="stylesheet" href="css/dist/dark-overrides.css" />
  <link rel="stylesheet" href="css/dist/settings.css" />

<style id="looz-final-patch">
/* ------------------ sizing tokens (match day rows) ------------------ */
:root{
  --row-h: 52px;                 /* day row visual height (from your inspector) */
  --row-r: 14px;                 /* same rounded corners */
  --pad-v: 7.2px;                /* day row vertical padding seen in inspector */
  --pad-h: 8.8px;                /* day row horizontal padding seen in inspector */
  --count-size: 28px;            /* diameter for week counter */
  --count-font: 800 12px/28px 'Rubik',system-ui,sans-serif;
}

/* ========================= DAY ROW (reference) ====================== */
.p-daytask{
  min-height: var(--row-h);
  padding: var(--pad-v) var(--pad-h);
  border-radius: var(--row-r);
}

/* Readable task text in dark */
html[data-theme="dark"] .p-daytask__text,
body.is-dark            .p-daytask__text{ color:#EAF2FF; }

/* ======================= ✓ / ✕ ACTION CHIPS ======================== */
/* Support both your classed icons and data-act fallbacks */
.p-daytask__actions, .task-item__actions{ display:flex; align-items:center; gap:.35rem; }

.p-daytask__actions .p-ico,
.task-item__actions .task-ico,
.task-item__actions [data-act]{
  display:grid; place-items:center;
  inline-size:30px; block-size:20px;
  border-radius:999px;
  font:800 12px/1 'Rubik',system-ui,sans-serif;
  border:1px solid #cbd5e1; background:#fff; color:#475569;
  user-select:none; cursor:pointer;
}

/* Make sure the glyphs exist even if buttons render empty */
.p-ico--ok::before,  .task-ico--ok::before,  [data-act="ok"]::before  { content:"✓"; }
.p-ico--del::before, .task-ico--del::before, [data-act="del"]::before { content:"✕"; }

/* Light theme colors */
.p-ico--ok,  .task-ico--ok,  [data-act="ok"]{
  background:linear-gradient(180deg,#ecfee7,#ffffff) !important;
  border-color:#9ad69b !important; color:#15803d !important;
}
.p-ico--del, .task-ico--del, [data-act="del"]{
  background:linear-gradient(180deg,#ffe8ea,#ffffff) !important;
  border-color:#f3b5b9 !important; color:#be123c !important;
}

/* Dark theme – golden hues + soft glow */
@keyframes loozGlowY { 0%,100%{box-shadow:0 0 12px rgba(255,208,86,.18)} 50%{box-shadow:0 0 18px rgba(255,208,86,.30)} }
@keyframes loozGlowR { 0%,100%{box-shadow:0 0 12px rgba(255,138,107,.18)}50%{box-shadow:0 0 18px rgba(255,138,107,.30)} }

html[data-theme="dark"] .p-daytask__actions .p-ico,
body.is-dark            .p-daytask__actions .p-ico,
html[data-theme="dark"] .task-item__actions .task-ico,
body.is-dark            .task-item__actions .task-ico,
html[data-theme="dark"] .task-item__actions [data-act],
body.is-dark            .task-item__actions [data-act]{
  background:#111827 !important; border-color:#2c4676 !important; color:#e5e7eb !important;
}

html[data-theme="dark"] .p-ico--ok,
body.is-dark            .p-ico--ok,
html[data-theme="dark"] .task-ico--ok,
body.is-dark            .task-ico--ok,
html[data-theme="dark"] [data-act="ok"],
body.is-dark            [data-act="ok"]{
  background:linear-gradient(180deg,#1c2b12,#13230e) !important;
  border-color:#a08b3a !important; color:#ffd456 !important;
  animation:loozGlowY 2.2s ease-in-out infinite;
}
html[data-theme="dark"] .p-ico--del,
body.is-dark            .p-ico--del,
html[data-theme="dark"] .task-ico--del,
body.is-dark            .task-ico--del,
html[data-theme="dark"] [data-act="del"],
body.is-dark            [data-act="del"]{
  background:linear-gradient(180deg,#2b1716,#201011) !important;
  border-color:#b0604e !important; color:#ff8a6b !important;
  animation:loozGlowR 2.2s ease-in-out infinite;
}

/* ========================= WEEK VIEW ================================ */
/* Make the “card” the same size vibe as the day row */
.p-week .p-day{
  border-radius:var(--row-r) !important;
  padding:0 !important; /* header controls the height */
  background:#fff8ea !important;
  border:1px solid #f1e4c6 !important;
  box-shadow:0 1px 0 rgba(0,0,0,.03) !important;
}

/* Header: one line, centered vertically, same height & padding as day rows
   Order (RTL layout): left=weekday, center=counter, right=numeric date   */
.p-week .p-day__head{
  display:grid !important;
  grid-template-columns:auto 1fr auto;    /* name | center flex | date */
  align-items:center !important;          /* vertical centering */
  min-height:var(--row-h) !important;
  padding:var(--pad-v) var(--pad-h) !important;
  column-gap:.5rem;
}

/* Place items into the grid columns explicitly to force the order */
.p-week .p-day__name { grid-column:1; justify-self:start; margin:0; font-weight:800; color:#0f172a; }
.p-week .p-day__date { grid-column:3; justify-self:end;   margin:0; font-weight:800; color:#64748b; }

/* Counter perfectly centered horizontally AND its number centered inside */
.p-week .p-day__count{
  grid-column:2; justify-self:center; align-self:center;
  inline-size:var(--count-size); block-size:var(--count-size);
  border-radius:50%;
  display:grid; place-items:center;        /* centers the number */
  font:var(--count-font);
  background:#fff; color:#0f172a;
  border:1px solid #e5e7eb;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
}

/* Dark theme parity for week view + readable text */
html[data-theme="dark"] .p-week .p-day,
body.is-dark            .p-week .p-day{
  background:#162540 !important; border-color:#2c4676 !important;
  box-shadow:0 10px 26px rgba(11,18,34,.55), inset 0 1px 0 rgba(255,255,255,.04) !important;
}
html[data-theme="dark"] .p-week .p-day__name,
body.is-dark            .p-week .p-day__name{ color:#EAF2FF !important; }
html[data-theme="dark"] .p-week .p-day__date,
body.is-dark            .p-week .p-day__date{ color:#9CB3D6 !important; }
html[data-theme="dark"] .p-week .p-day__count,
body.is-dark            .p-week .p-day__count{
  background:#0f1b2f !important; color:#e5ecf5 !important; border-color:#2c4676 !important;
}

/* Stronger dark-mode contrast for day rows (titles/time/text) */
html[data-theme="dark"] .p-daytask__time,
body.is-dark            .p-daytask__time{
  background:#0f1b2f; color:#E4ECFF; border:1px solid #3b588b;
}
html[data-theme="dark"] .p-day__head .p-day__title,
html[data-theme="dark"] .p-daytask__text{ color:#EAF2FF; }
/* ==== LooZ Create Event — Colorful Refresh (RTL + Dark Mode) ==== */

/* Theme tokens */
:root{
  --looz-accent:      #f59e0b;  /* amber */
  --looz-accent-2:    #22c55e;  /* green */
  --looz-ink:         #0f172a;  /* slate-900 */
  --looz-ink-soft:    #334155;  /* slate-700 */
  --looz-bg:          #f7f8fb;
  --looz-card:        #f3f4f6;
  --looz-ring:        rgba(245, 158, 11, .35);
  --looz-glass:       rgba(255,255,255,.55);
  --looz-border:      #e5e7eb;
}
html[data-theme="dark"]{
  --looz-accent:      #f59e0b;
  --looz-accent-2:    #84cc16;  /* lime for extra pop on dark */
  --looz-ink:         #e5e7eb;
  --looz-ink-soft:    #9ca3af;
  --looz-bg:          #0b1220;
  --looz-card:        #0f172a;
  --looz-ring:        rgba(245, 158, 11, .45);
  --looz-glass:       rgba(17,24,39,.6);
  --looz-border:      #1f2937;
}

/* Backdrop slight tint (nicer on OLED) */
#eventComposer .composer__backdrop{
  background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.35));
}

/* Card gets a glassy look + gradient header strip (no extra DOM) */
#eventComposer .composer__panel{
  background: linear-gradient(180deg, var(--looz-card), color-mix(in oklab, var(--looz-card) 92%, #fff 8%));
  border: 1px solid var(--looz-border);
  color: var(--looz-ink);
  box-shadow:
    0 22px 60px rgba(0,0,0,.18),
    0 1px 0 rgba(255,255,255,.45) inset;
  overflow: hidden;
  position: relative;
}

/* Top accent progress bar (CSS only). Width changes by data-step */
#eventComposer .composer__panel::before{
  content:"";
  position:absolute; inset:0 auto auto 0;
  height:6px; width:100%;
  background:
    linear-gradient(90deg, var(--looz-accent), var(--looz-accent-2));
  transform-origin: right center; /* RTL: fill from right to left */
  transform: scaleX(.3333);
  transition: transform .28s ease;
  border-bottom: 1px solid color-mix(in oklab, var(--looz-accent) 65%, black 10%);
}
#eventComposer[data-step="1"] .composer__panel::before{ transform: scaleX(.3333); }
#eventComposer[data-step="2"] .composer__panel::before{ transform: scaleX(.6666); }
#eventComposer[data-step="3"] .composer__panel::before{ transform: scaleX(1); }

/* Header: title centered, close button modernized */
.composer__header{
  padding: 10px 8px 2px;
}
.composer__title{
  font-weight: 800; letter-spacing: .2px;
  background: linear-gradient(90deg, var(--looz-ink), var(--looz-ink-soft));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

/* Close (X) */
.composer__close{
  background: color-mix(in oklab, var(--looz-card) 82%, white 18%);
  color: var(--looz-ink);
  border: 1px solid var(--looz-border);
  transition: transform .12s ease, box-shadow .12s ease;
}
.composer__close:hover{ transform: translateY(-1px); }
html[data-theme="dark"] .composer__close{
  background: color-mix(in oklab, var(--looz-card) 88%, black 12%);
  color: var(--looz-ink);
}

/* Inputs (title/date/time) — soft glass, better focus ring */
#eventComposer .line{
  margin: 12px 0;
}
#eventComposer .line input{
  width: 100%;
  font-size: 1.05rem;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid var(--looz-border);
  color: var(--looz-ink);
  background:
    linear-gradient(180deg, var(--looz-glass), transparent),
    color-mix(in oklab, var(--looz-card) 94%, white 6%);
  box-shadow: 0 1px 0 rgba(0,0,0,.03);
  transition: border-color .15s ease, box-shadow .15s ease, background .2s ease;
  outline: none;
}
/* IMPORTANT: show the caret (we killed the pencil cursor earlier) */
#eventComposer .line input{ caret-color: currentColor !important; }

#eventComposer .line input::placeholder{
  color: color-mix(in oklab, var(--looz-ink) 50%, transparent);
}
#eventComposer .line input:focus{
  border-color: color-mix(in oklab, var(--looz-accent) 70%, var(--looz-border));
  box-shadow:
    0 0 0 3px var(--looz-ring),
    0 8px 22px rgba(2,6,23,.08);
}
html[data-theme="dark"] #eventComposer .line input{
  box-shadow: 0 1px 0 rgba(0,0,0,.25);
}

/* Small helper under title (voice note) */
#compMicNote{
  margin-top: 8px;
  font-size: .9rem;
  color: color-mix(in oklab, var(--looz-ink) 66%, transparent);
}

/* Hide legacy Save area if it still exists */
#eventComposer .composer__actions{ display:none !important; }

/* Mic button: glossy + pulse when active (position still driven by JS) */
#compMic.mic-ico{
  width: 56px; height: 56px; border-radius: 999px;
  border: 1.5px solid color-mix(in oklab, var(--looz-ink) 70%, var(--looz-border));
  background: radial-gradient(120% 120% at 80% 15%, #fff 0%, #fff0 60%),
              linear-gradient(180deg, #ffffff, color-mix(in oklab, #ffffff 70%, var(--looz-card)));
  color: var(--looz-ink);
  box-shadow:
     0 10px 28px rgba(2,6,23,.14),
     0 2px 0 rgba(255,255,255,.6) inset;
  transition: transform .12s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
  transform: translate(-50%, 0); /* keep horizontal centering */
}
#compMic.mic-ico:hover{ transform: translate(-50%, 0) translateY(-2px); }

html[data-theme="dark"] #compMic.mic-ico{
  background:
    radial-gradient(120% 120% at 80% 15%, rgba(255,255,255,.06) 0%, #0000 60%),
    linear-gradient(180deg, #1f2937, #0f172a);
  border-color: color-mix(in oklab, var(--looz-ink) 30%, var(--looz-border));
  color: var(--looz-ink);
  box-shadow:
    0 10px 28px rgba(0,0,0,.45),
    0 1px 0 rgba(255,255,255,.06) inset;
}

/* Active recording state */
#compMic.mic-ico.is-on{
  box-shadow:
    0 0 0 5px color-mix(in oklab, var(--looz-accent) 30%, transparent),
    0 10px 28px rgba(2,6,23,.18);
  border-color: var(--looz-accent);
  background:
    radial-gradient(120% 120% at 80% 15%, rgba(255,255,255,.75) 0%, #fff0 60%),
    linear-gradient(180deg, #fffdf6, #ffeabf);
}
html[data-theme="dark"] #compMic.mic-ico.is-on{
  background:
    radial-gradient(120% 120% at 80% 15%, rgba(255,255,255,.08) 0%, #0000 60%),
    linear-gradient(180deg, #1f2937, #2b1c05);
}

/* Pulsing ring around mic while recording (no extra DOM) */
#compMic.mic-ico.is-on::after{
  content:"";
  position:absolute; inset: -10px auto auto 50%;
  width: 72px; height: 72px; transform: translateX(-50%);
  border-radius: 999px;
  background: radial-gradient(closest-side, color-mix(in oklab, var(--looz-accent) 32%, transparent), transparent 60%);
  animation: mic-breathe 1.2s ease-in-out infinite;
  pointer-events: none;
  filter: blur(.2px);
}
@keyframes mic-breathe{
  0%, 100% { opacity: .55; transform: translateX(-50%) scale(.98); }
  50%      { opacity: .12; transform: translateX(-50%) scale(1.12); }
}

/* Step visibility stays the same (task→date→time) but add gentle reveal */
#eventComposer .line[data-step]{ display: none; opacity: 0; transform: translateY(4px); transition: opacity .18s ease, transform .18s ease; }
#eventComposer[data-step="1"] .line[data-step="1"]{ display:block; opacity: 1; transform:none; }
#eventComposer[data-step="2"] .line[data-step="1"], 
#eventComposer[data-step="2"] .line[data-step="2"]{ display:block; opacity: 1; transform:none; }
#eventComposer[data-step="3"] .line[data-step]{ display:block; opacity: 1; transform:none; }

/* Better spacing to make the mic sit “more bottom” */
#eventComposer .composer__form{ padding-bottom: 90px; }

/* Nice selection color */
#eventComposer ::selection{
  background: color-mix(in oklab, var(--looz-accent) 45%, #fff);
  color: #1f2937;
}
html[data-theme="dark"] #eventComposer ::selection{
  background: color-mix(in oklab, var(--looz-accent) 45%, #000);
  color: #f8fafc;
}

</style>

      <section id="eventComposer" class="composer composer--card u-hidden" dir="rtl" aria-hidden="true">
        <button class="composer__backdrop" type="button" data-close aria-label="סגור"></button>
        <div class="composer__panel" role="dialog" aria-modal="true" aria-labelledby="compTitleLabel">
          <header class="composer__header">
            <button class="composer__close" type="button" data-close aria-label="סגור">✕</button>
            <h3 class="composer__title">אירוע חדש</h3>
          </header>

          <form id="composerForm" class="composer__form" autocomplete="off">
            <div class="line" data-step="1">
              <label class="visually-hidden" for="compTitle">תיאור המשימה</label>
              <input id="compTitle" type="text" placeholder="תיאור המשימה…" autocomplete="off" />
              <button id="compMic" class="mic-ico" type="button" aria-pressed="false" title="דבר/י" aria-label="דבר/י">
                <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                  <rect x="9" y="3" width="6" height="12" rx="3" fill="currentColor"></rect>
                  <path d="M6 11v1a6 6 0 0 0 12 0v-1M12 18v3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </button>
              <div id="compMicNote" class="mic-note" aria-live="polite"></div>
            </div>

            <div class="line" data-step="2">
              <label class="visually-hidden" for="compDate">תאריך</label>

            <div class="line" data-step="3">
              <label class="visually-hidden" for="compTime">שעה</label>

            <div class="composer__actions" aria-hidden="true"></div>

        </div>
      </section>

    </div>
  </main>

  <!-- Scripts -->
  <script src="app.js" defer></script>
  <script src="js/logo.js" defer></script>

  <!-- Mark today's row in planner -->
  <script>
    (function () {
      const PLANNER = document.getElementById('planner');
      function markTodayRow() {
        if (!PLANNER) return;
        const d = new Date();
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const token = dd + '.' + mm;

        PLANNER.querySelectorAll('.is-today').forEach(el => el.classList.remove('is-today'));
        PLANNER.querySelectorAll('.p-day__head, .p-day__head--flex, .c-week .row').forEach(row => {
          const dateEl = row.querySelector('.p-day__date, .date');
          if (dateEl && (dateEl.textContent || '').trim().startsWith(token)) {
            row.classList.add('is-today');
          }
        });
      }
      document.addEventListener('DOMContentLoaded', markTodayRow);
      if (PLANNER && 'MutationObserver' in window) {
        new MutationObserver(markTodayRow).observe(PLANNER, { childList:true, subtree:true });
      }
    })();
  </script>

  <!-- Focus delegation for task rows (unchanged) -->
  <script>
    document.addEventListener('focusin', function(e){
      const row = e.target.closest && e.target.closest('.task-item');
      if (row && e.target === row) {
        const inp = row.querySelector('.task-item__text');
        if (inp) { requestAnimationFrame(()=> inp.focus()); }
      }
    });
  </script>
