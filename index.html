<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LooZ</title>

  <!-- Apply saved theme before paint (prevents flash) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <!-- Global theme (keep early so dark mode styles resolve immediately) -->
  <script src="js/theme.js"></script>

  <!-- Optional: base for GitHub Pages -->
  <script>
    (function () {
      if (/github\.io$/.test(location.hostname)) {
        var seg = (location.pathname.split('/').filter(Boolean)[0] || '');
        var base = '/' + (seg ? seg + '/' : '');
        var el = document.createElement('base'); el.href = base;
        document.head.appendChild(el);
      }
    })();
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/dist/main.css" />
  <link rel="stylesheet" href="css/dist/dark-overrides.css" />
  <link rel="stylesheet" href="css/dist/settings.css" />

  <style>
  /* ===== Event Composer (focused, minimal, unchanged behavior) ===== */
  #eventComposer.composer { position: fixed; inset: 0; display: grid; place-items: center; z-index: 9999; }
  #eventComposer .composer__backdrop { position: absolute; inset:0; background: rgba(0,0,0,.45); }
  #eventComposer .composer__panel{
    position: relative; width:min(92vw,520px);
    background:#f3f4f5; border-radius:18px;
    padding:18px 18px 16px;
    box-shadow:0 22px 60px rgba(0,0,0,.18), 0 1px 0 rgba(255,255,255,.6) inset;
    border:1px solid #e5e7eb; color:#0f172a;
  }
  html[data-theme="dark"] #eventComposer .composer__panel{
    background:#111827; border-color:#1f2937; color:#e5e7eb;
    box-shadow:0 22px 60px rgba(0,0,0,.55);
  }

  /* Header: X on TOP-LEFT, title same line centered */
  .composer__header{
    display:grid;
    grid-template-columns:auto 1fr;
    align-items:center;
    column-gap:8px;
    margin-bottom:8px;
    padding-inline:8px;
  }
  .composer__title{
    margin:0; font-weight:800; font-size:18px; text-align:center; justify-self:center;
  }
  .composer__close{
    justify-self:start; width:32px;height:32px;border-radius:12px;
    appearance:none;border:none;cursor:pointer;
    display:grid;place-items:center;
    background:#fff;color:#0f172a;box-shadow:0 8px 20px rgba(2,6,23,.12);
  }
  html[data-theme="dark"] .composer__close{ background:#111827;color:#f8fafc;box-shadow:0 8px 20px rgba(0,0,0,.35); }

  /* Pencil cursor INSIDE panel */
  #compPencil.pencil-icon{
    position:absolute; width:22px; height:22px; z-index:6; display:none; pointer-events:none;
    animation:pencil-flicker .9s infinite;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.15));
  }

  /* Mic INSIDE panel — dead-center above Save; JS sets left/top */
  #compMic.mic-ico{
    position:absolute; width:36px; height:36px; border-radius:9999px; z-index:6;
    display:inline-grid; place-items:center; font-size:14px; cursor:pointer;
    background:#fff; color:#0f172a; border:1.5px solid #0f172a;
    box-shadow:0 8px 18px rgba(2,6,23,.14);
    transform:translate(-50%,0);
  }
  #compMic.mic-ico.is-on{ box-shadow:0 0 0 4px rgba(99,102,241,.18); }
  html[data-theme="dark"] #compMic.mic-ico{ background:#1f2937; color:#e5e7eb; border-color:#e5e7eb; }

  /* Hide native caret so pencil acts as cursor */
  #eventComposer .line input{ caret-color:transparent; }

  /* Step reveal (task→date→time). Mic only on step 1 */
  #eventComposer .line[data-step]{ display:none; }
  #eventComposer[data-step="1"] .line[data-step="1"]{ display:block; }
  #eventComposer[data-step="2"] .line[data-step="1"],
  #eventComposer[data-step="2"] .line[data-step="2"]{ display:block; }
  #eventComposer[data-step="3"] .line[data-step]{ display:block; }
  #eventComposer[data-step="1"] #compMic{ display:inline-grid; }
  #eventComposer:not([data-step="1"]) #compMic{ display:none; }

  /* Buttons — pill */
  .c-btn, .btn-create-orb, .p-weekbar__btn, .p-day__count, .c-headbtn, .qp__chip{
    -webkit-tap-highlight-color:transparent; appearance:none; border:none; outline:none; cursor:pointer; user-select:none;
    background:#fff; color:#0f172a; padding:10px 16px; border-radius:14px;
    box-shadow:0 8px 20px rgba(2,6,23,.12);
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  .c-btn:hover, .btn-create-orb:hover, .p-weekbar__btn:hover, .p-day__count:hover, .c-headbtn:hover, .qp__chip:hover{
    transform:translateY(-1px); box-shadow:0 10px 26px rgba(2,6,23,.16);
  }
  .c-btn:active, .btn-create-orb:active, .p-weekbar__btn:active, .p-day__count:active, .c-headbtn:active, .qp__chip:active{
    transform:none; box-shadow:0 6px 16px rgba(2,6,23,.12);
  }
  .c-btn--primary{ font-weight:600; }
  html[data-theme="dark"] .c-btn,
  html[data-theme="dark"] .btn-create-orb,
  html[data-theme="dark"] .p-weekbar__btn,
  html[data-theme="dark"] .p-day__count,
  html[data-theme="dark"] .c-headbtn,
  html[data-theme="dark"] .qp__chip{
    background:#111827; color:#f8fafc; box-shadow:0 8px 20px rgba(0,0,0,.35);
  }

  /* Task Row (time · text · ✓ ✕) */
  .task-item{
    display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:.6rem;
    padding:.55rem .7rem; border-radius:14px; background:#fff8ea;
    border:1px solid #f1e4c6; box-shadow:0 1px 0 rgba(0,0,0,.03); outline:none;
  }
  .task-item:focus-within{ border-color:#ffd27a; box-shadow:0 0 0 3px rgba(255,210,122,.25); }
  .task-item__time{
    font-weight:700; font-size:.95rem; color:#374151;
    background:#ffefc0; padding:.15rem .55rem; border-radius:999px; line-height:1; white-space:nowrap;
  }
  .task-item__text{
    width:100%; min-width:0; border:none; outline:none; background:transparent; font-size:1rem; color:#1f2937;
  }
  .task-item__text::placeholder{ color:#9aa4b2; }
 /* ——— Task row actions: tiny rounded-pill ✓ / ✕ ——— */
.task-item__actions{ display:flex; align-items:center; gap:.35rem; }

.task-ico{
  /* pill look like your screenshot */
  inline-size: 30px;
  block-size: 16px;
  border-radius: 999px;
  display: inline-grid; place-items: center;
  font-size: 12px; line-height: 1; font-weight: 800;
  color: #4b5563;               /* glyph color */
  background: linear-gradient(180deg,#fff,#fff9ef);
  border: 1px solid #cbd5e1;
  box-shadow: 0 1px 0 rgba(0,0,0,.03);
  cursor: pointer;
  user-select: none;
}
.task-ico:active{ transform: translateY(1px); }

/* success / delete accents are subtle, glyph stays dark */
.task-ico--ok  { background: linear-gradient(180deg,#f6ffef,#fff); }
.task-ico--del { background: linear-gradient(180deg,#fff5f6,#fff); }

/* dark mode */
html[data-theme="dark"] .task-ico{
  color:#e5ecf5;
  background: linear-gradient(180deg,#132036,#0f1a2d);
  border-color:#2c4676;
  box-shadow: 0 0 0 1px rgba(0,0,0,.25) inset;
}
html[data-theme="dark"] .task-ico--ok  { background: linear-gradient(180deg,#12291c,#0f1a2d); }
html[data-theme="dark"] .task-ico--del { background: linear-gradient(180deg,#2a1820,#0f1a2d); }

/* make task text readable in dark */
html[data-theme="dark"] .task-item__text{ color:#eaf2ff; }
html[data-theme="dark"] .task-item{
  background:#162540;
  border-color:#2c4676;
  box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset;
}
/* time chip dark */
html[data-theme="dark"] .task-item__time{
  color:#e4ecff; background:#0f1b2f; border:1px solid #3b588b;
}


  @media (max-width: 420px){
    .task-item{ padding:.5rem .6rem; gap:.5rem; }
    .task-item__time{ font-size:.9rem; }
    .task-ico{ width:24px; height:20px; }
  }

  /* Save button spacing under mic (Fibonacci 34px) */
  #eventComposer .composer__actions{ display:flex; justify-content:center; margin-top:34px; }

  /* Pencil flicker */
  @keyframes pencil-flicker{
    0%,48%{ opacity:1 } 49%,100%{ opacity:0 }
  }
  /* === Fixed bottom-center orb ================================================= */
.fab-rail{
  position: fixed;
  left: 0; right: 0;
  bottom: calc(env(safe-area-inset-bottom) + 14px);
  display: grid; place-items: center;
  z-index: 60;
  pointer-events: none;               /* rail is click-through */
}
.fab-rail .btn-create-orb{ pointer-events:auto; }

/* Orb visuals (same look as when pressed) */
.btn-create-orb{
  position: relative;
  inline-size: clamp(86px, 24vw, 112px);
  block-size:  clamp(86px, 24vw, 112px);
  border-radius: 50%;
  border: 0;
  display: grid; place-items: center;
  color: transparent; text-indent: -9999px; line-height: 0;
  cursor: pointer;
  background:
    radial-gradient(120% 110% at 38% 22%, rgba(255,255,255,.95) 0 56%, rgba(255,255,255,0) 58%),
    radial-gradient(140% 120% at 62% 115%, #f8d8a2 0, #f4c984 42%, #efc272 68%, #e8b861 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.92),
    0 12px 24px rgba(0,0,0,.28),
    0 1px 0 rgba(0,0,0,.06),
    0 0 0 1px rgba(219,185,120,.42);
}
.btn-create-orb:active{ transform: translateY(1px) scale(.985); }

/* golden inner tile */
.btn-create-orb::before{
  content:"";
  position:absolute; left:50%; top:50%;
  width:42%; height:42%;
  transform:translate(-50%,-46%);
  border-radius:22%;
  background:
    radial-gradient(140% 120% at 34% 28%, rgba(255,255,255,.85), rgba(255,255,255,0) 54%),
    linear-gradient(180deg, #f6d57a, #e6b65f);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    0 10px 16px rgba(0,0,0,.12),
    0 0 0 1px rgba(160,121,30,.28);
  pointer-events:none;
}

/* blue + badge */
.btn-create-orb::after{
  content:"";
  position:absolute; left:60%; top:26%;
  width:22%; height:22%;
  border-radius:50%;
  border:2px solid #fff;
  background:
     linear-gradient(#fff 0 0) center / 62% 12% no-repeat,
     linear-gradient(#fff 0 0) center / 12% 62% no-repeat,
     radial-gradient(120% 140% at 30% 25%, #51c7ff, #1b7cff 70%, #1560d8 100%);
  box-shadow:
     inset 0 1px 0 rgba(255,255,255,.55),
     0 8px 14px rgba(27,124,255,.35);
  pointer-events:none;
}

/* dark: same size, a touch more lift */
:is(html,body).is-dark .btn-create-orb{
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.92),
    0 16px 30px rgba(0,0,0,.45),
    0 0 0 1px rgba(219,185,120,.32),
    0 0 40px rgba(255,210,120,.12);
}
/* --- DARK MODE PATCH for task rows --------------------------------- */
/* Support both switches your app uses: data-theme="dark" and body.is-dark */
:root{
  --ok-ink:#7ee787;  --ok-br:#1a7f47;  --ok-bg:#0f2a1c;
  --del-ink:#fda4af; --del-br:#b91c1c; --del-bg:#2b0f18;
}

/* container */
html[data-theme="dark"] .task-item,
body.is-dark .task-item{
  background:#0f1b2f;                 /* deep panel, fits your vibe */
  border-color:#2c4676;
}

/* the INPUT itself (high specificity + !important) */
html[data-theme="dark"] input.task-item__text,
body.is-dark input.task-item__text{
  color:#e5ecf5 !important;
}
html[data-theme="dark"] input.task-item__text::placeholder,
body.is-dark input.task-item__text::placeholder{
  color:#93a4c7 !important;
}

/* time chip */
html[data-theme="dark"] .task-item__time,
body.is-dark .task-item__time{
  background:#0d1728;
  border:1px solid #3b588b;
  color:#e4ecff;
}

/* action buttons – visible in dark */
html[data-theme="dark"] .task-ico,
body.is-dark .task-ico{
  background:#111827;
  border-color:#2c4676;
  color:#e5e7eb;
}

/* ✓ and ✕ colors in dark */
html[data-theme="dark"] .task-ico--ok,
body.is-dark .task-ico--ok{
  background:var(--ok-bg);
  border-color:var(--ok-br);
  color:var(--ok-ink);
}
html[data-theme="dark"] .task-ico--del,
body.is-dark .task-ico--del{
  background:var(--del-bg);
  border-color:var(--del-br);
  color:var(--del-ink);
}

/* Fallback: draw symbols even if button text is empty */
.task-ico--ok::before{ content:"✓"; }
.task-ico--del::before{ content:"✕"; }

  </style>

  <!-- Resilient auth guard loader -->
  <script>
    (function () {
      function load(primary, fallback) {
        var s = document.createElement('script');
        s.src = primary; s.defer = true;
        s.onerror = function () {
          var f = document.createElement('script');
          f.src = fallback; f.defer = true;
          document.head.appendChild(f);
        };
        document.head.appendChild(s);
      }
      load('js/auth-guard.js', './auth-guard.js');
    })();
  </script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet" />
</head>

      <!-- Header -->

  <!-- Mark today's row in planner -->
  <script>
    (function () {
      const PLANNER = document.getElementById('planner');
      function markTodayRow() {
        if (!PLANNER) return;
        const d = new Date();
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const token = dd + '.' + mm;

        PLANNER.querySelectorAll('.is-today').forEach(el => el.classList.remove('is-today'));
        PLANNER.querySelectorAll('.p-day__head--flex, .c-week .row').forEach(row => {
          const dateEl = row.querySelector('.p-day__date, .date');
          if (dateEl && (dateEl.textContent || '').trim().startsWith(token)) {
            row.classList.add('is-today');
          }
        });
      }
      document.addEventListener('DOMContentLoaded', markTodayRow);
      if (PLANNER && 'MutationObserver' in window) {
        new MutationObserver(markTodayRow).observe(PLANNER, { childList:true, subtree:true });
      }
    })();
  </script>

  <!-- Task row focus delegation + optional helper -->
  <script>
    // Delegate container focus to the inner input
    document.addEventListener('focusin', function(e){
      const row = e.target.closest && e.target.closest('.task-item');
      if (row && e.target === row) {
        const inp = row.querySelector('.task-item__text');
        if (inp) { requestAnimationFrame(()=> inp.focus()); }
      }
    });

    // Helper to create a task row programmatically (kept for reuse)
    function createTaskRow({id, time, text=''}) {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.tabIndex = 0;
      div.dataset.id = id;

      div.innerHTML = `
        <span class="task-item__time" dir="ltr">${time || ''}</span>
        <input class="task-item__text" type="text" placeholder="תיאור המשימה…" value="${text || ''}">
        <div class="task-item__actions">
          <button class="task-ico task-ico--ok"  title="בוצע" aria-label="בוצע">✓</button>
          <button class="task-ico task-ico--del" title="מחק"  aria-label="מחק">×</button>
        </div>
      `;

      // click container -> focus text
      div.addEventListener('click', (ev)=>{
        if (!ev.target.closest('.task-ico')) {
          const inp = div.querySelector('.task-item__text');
          inp && inp.focus();
        }
      });

      // sample action buttons (hook into your existing handlers)
      div.querySelector('.task-ico--ok') .addEventListener('click', ()=> div.classList.add('is-done'));
      div.querySelector('.task-ico--del').addEventListener('click', ()=> div.remove());

      return div;
    }

    // Example usage (disabled):
    // document.querySelector('#someList')?.appendChild(createTaskRow({ id:'t1', time:'19:23', text:'שם המשימה' }));
  </script>
</body>
