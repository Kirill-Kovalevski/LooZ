<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LooZ</title>

  <!-- Apply saved theme before paint (prevents flash) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <!-- Global theme (keep early so dark mode styles resolve immediately) -->
  <script src="js/theme.js"></script>

  <!-- Optional: base for GitHub Pages -->
  <script>
    (function () {
      if (/github\.io$/.test(location.hostname)) {
        var seg = (location.pathname.split('/').filter(Boolean)[0] || '');
        var base = '/' + (seg ? seg + '/' : '');
        var el = document.createElement('base'); el.href = base;
        document.head.appendChild(el);
      }
    })();
  </script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/dist/main.css" />
  <link rel="stylesheet" href="css/dist/dark-overrides.css" />
  <link rel="stylesheet" href="css/dist/settings.css" />

  <!-- =============== LOOZ — FINAL FIXES (single block) =============== -->
  <style id="looz-fixes">
  /* ---------- sizing tokens (tune if needed) ---------- */
  :root{
    /* Inspect showed ~35px day row; we lock both day & week rows to 36px */
    --row-h: 36px;
    --row-r: 14px;
    --wk-chip: 28px;
    --wk-font: 800 12px/28px 'Rubik',system-ui,sans-serif;
  }

  /* =====================================================
     1) DAY VIEW — ✓ / ✕ chips
     - Works with .task-ico--ok / .task-ico--del or data-act="ok|del"
     ===================================================== */
  .task-item__actions .task-ico,
  .task-item__actions [data-act]{
    display:grid; place-items:center;
    inline-size:30px; block-size:20px;
    border-radius:999px;
    font:800 12px/1 'Rubik',system-ui,sans-serif;
    border:1px solid #d6dbe4; background:#fff; color:#475569;
    user-select:none; cursor:pointer;
    box-shadow:0 1px 0 rgba(0,0,0,.03);
  }
  .task-ico--ok::before,  [data-act="ok"]::before  { content:"✓"; }
  .task-ico--del::before, [data-act="del"]::before { content:"✕"; }

  /* Light: green ✓ / red ✕ */
  .task-ico--ok,  [data-act="ok"]{
    background:linear-gradient(180deg,#ecfee7,#ffffff) !important;
    border-color:#9ad69b !important; color:#15803d !important;
  }
  .task-ico--del, [data-act="del"]{
    background:linear-gradient(180deg,#ffe8ea,#ffffff) !important;
    border-color:#f3b5b9 !important; color:#be123c !important;
  }

  /* Dark: golden hues + gentle glow */
  @keyframes loozGlowY { 0%,100%{box-shadow:0 0 12px rgba(255,208,86,.18)} 50%{box-shadow:0 0 18px rgba(255,208,86,.30)} }
  @keyframes loozGlowR { 0%,100%{box-shadow:0 0 12px rgba(255,138,107,.18)}50%{box-shadow:0 0 18px rgba(255,138,107,.30)} }

  html[data-theme="dark"] .task-item__actions .task-ico,
  body.is-dark            .task-item__actions .task-ico,
  html[data-theme="dark"] .task-item__actions [data-act],
  body.is-dark            .task-item__actions [data-act]{
    background:#111827 !important; color:#e5e7eb !important; border-color:#2c4676 !important;
  }
  html[data-theme="dark"] .task-ico--ok,
  body.is-dark            .task-ico--ok,
  html[data-theme="dark"] [data-act="ok"],
  body.is-dark            [data-act="ok"]{
    background:linear-gradient(180deg,#1c2b12,#13230e) !important;
    border-color:#a08b3a !important; color:#ffd456 !important;     /* golden-yellow */
    animation:loozGlowY 2.2s ease-in-out infinite;
  }
  html[data-theme="dark"] .task-ico--del,
  body.is-dark            .task-ico--del,
  html[data-theme="dark"] [data-act="del"],
  body.is-dark            [data-act="del"]{
    background:linear-gradient(180deg,#2b1716,#201011) !important;
    border-color:#b0604e !important; color:#ff8a6b !important;     /* golden-red */
    animation:loozGlowR 2.2s ease-in-out infinite;
  }

  /* =====================================================
     2) WEEK VIEW — same size as day rows + alignment
        (Right=date | Center=counter | Left=weekday)
     ===================================================== */

  /* Card shell matches day-view feel, height driven by head row */
  .p-week .p-day{
    padding:0 !important;
    border-radius:var(--row-r) !important;
    border:1px solid rgba(197,154,33,.25) !important;
    background:radial-gradient(120% 100% at 0% 0%, #fffef4 0%, #fffaf0 40%, #fff8ea 100%) !important;
    box-shadow:0 1px 0 rgba(121,85,0,.06), 0 8px 18px rgba(121,85,0,.06) !important;
  }

  /* Head row: space-between horizontally, dead-center vertically,
     exact same height & padding as a day row */
  .p-week .p-day__head{
    display:flex !important;
    justify-content:space-between !important;
    align-items:center !important;
    min-height:var(--row-h) !important;
    padding:.45rem .55rem !important;     /* ~7.2px 8.8px like your day row */
    gap:.5rem !important;
  }

  /* Right: date (DD.MM) */
  .p-week .p-day__date{
    margin:0 !important; font-weight:800 !important; color:#64748b !important;
  }

  /* Center: circular counter — number perfectly centered */
  .p-week .p-day__count{
    display:grid !important; place-items:center !important;
    inline-size:var(--wk-chip) !important; block-size:var(--wk-chip) !important;
    border-radius:50% !important;
    font:var(--wk-font) !important;
    background:#fff !important; color:#0f172a !important;
    border:1px solid #e5e7eb !important;
    box-shadow:0 2px 6px rgba(0,0,0,.06) !important;
  }

  /* Left: weekday name */
  .p-week .p-day__name{
    margin:0 !important; font-weight:800 !important; color:#0f172a !important;
  }

  /* Dark parity for the week card */
  html[data-theme="dark"] .p-week .p-day{
    background:#162540 !important; border-color:#2c4676 !important;
    box-shadow:0 10px 26px rgba(11,18,34,.55), inset 0 1px 0 rgba(255,255,255,.04) !important;
  }
  html[data-theme="dark"] .p-week .p-day__name{ color:#eaf2ff !important; }
  html[data-theme="dark"] .p-week .p-day__date{ color:#9cb3d6 !important; }
  html[data-theme="dark"] .p-week .p-day__count{
    background:#0f1b2f !important; color:#e5ecf5 !important; border-color:#2c4676 !important;
  }

  /* =====================================================
     3) Day task container: ensure locked height & radius
     ===================================================== */
  .task-item{
    display:grid; grid-template-columns:auto 1fr auto;
    align-items:center; gap:.6rem;
    min-height:var(--row-h) !important;
    border-radius:var(--row-r) !important;
  }

  /* Keep caret visible in composer inputs (small UX fix) */
  #eventComposer .line input{ caret-color:auto !important; }
  </style>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet" />
</head>

<body>
  <main class="o-page">
    <div class="o-phone">

      <!-- Header -->
      <header id="appHeader" class="o-header o-inner">
        <button id="btnProfile" class="c-topbtn" type="button" aria-label="פרופיל">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
          </svg>
        </button>

        <button id="btnMenu" class="c-topbtn c-topbtn--right" type="button" aria-label="הגדרות">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="5" r="2"></circle>
            <circle cx="12" cy="12" r="2"></circle>
            <circle cx="12" cy="19" r="2"></circle>
          </svg>
        </button>

        <!-- LOGו -->
        <a class="looz-logo" href="index.html" aria-label="LooZ">
          <img class="brand-logo brand-logo--light" src="icons/main-logo.png" alt="LooZ" />
          <img class="brand-logo brand-logo--dark"  src="icons/dark-logo.png"  alt="LooZ" />
        </a>

        <!-- Lemon menu toggle -->
        <button id="lemonToggle" class="c-icon-btn c-icon-btn--lemon" type="button"
                aria-label="פתח/סגור תפריט" aria-expanded="false" aria-controls="appNav">
          <span id="lemonIcon" class="lemon-host" aria-hidden="true"></span>
          <svg class="lemon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet">
            <defs>
              <radialGradient id="lemBody" cx="50%" cy="42%" r="75%">
                <stop offset="0%"  stop-color="#FFF6B8"/>
                <stop offset="48%" stop-color="#FFE067"/>
                <stop offset="100%" stop-color="#F7C843"/>
              </radialGradient>
            </defs>
            <g transform="translate(0,0) scale(1.05)">
              <path d="M19 7c-3-3-8-3-11 0-2 2.3-2 6 0 8 2.2 2.1 5.8 2.4 8 0 2.2-2.1 2.6-5.4 1-7.6"
                    fill="url(#lemBody)" stroke="#B8860B" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M18 6c.9-.9 1.7-1.8 2.3-2.8"
                    stroke="#2E7D32" stroke-linecap="round" stroke-width="2"/>
            </g>
          </svg>
        </button>

        <!-- Template: Task Row -->
        <template id="task-item-template">
          <div class="task-item" tabindex="0" data-id="">
            <span class="task-item__time" dir="ltr"></span>
            <input class="task-item__text" type="text" placeholder="תיאור המשימה…" value="" inputmode="text" />
            <div class="task-item__actions">
              <button class="task-ico" data-act="ok"  aria-label="בוצע"></button>
              <button class="task-ico" data-act="del" aria-label="מחק"></button>
            </div>
          </div>
        </template>

        <!-- In-flow NAV -->
        <nav id="appNav" class="c-nav u-is-collapsed" aria-label="ראשי" aria-hidden="true">
          <div class="c-nav__panel" id="navPanel">
            <div class="c-nav__row">
              <button class="c-icon-btn" aria-label="קטגוריות" id="btnCategories" title="קטגוריות">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                  <rect x="3" y="4" width="8" height="16" rx="2"></rect>
                  <rect x="13" y="4" width="8" height="16" rx="2"></rect>
                </svg>
              </button>

              <!-- Search with live suggestions -->
              <label class="c-search" aria-label="חיפוש פעילויות">
                <input id="navSearch" class="c-search__input" type="search" placeholder="חיפוש פעילויות" autocomplete="off"
                       aria-autocomplete="list" aria-expanded="false" aria-controls="sugList" />
                <button id="searchClear" class="c-search__clear" type="button" aria-label="נקה">×</button>
                <button id="searchGo" class="c-search__go" type="button" aria-label="חפש">
                  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="1.5"></circle>
                    <path d="M16 16l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
                  </svg>
                </button>

                <!-- suggestions dropdown -->
                <div id="sugWrap" class="sug-wrap u-hidden" role="listbox" aria-label="הצעות">
                  <div class="sug-head">הצעות</div>
                  <div id="sugList" class="sug-list"></div>
                </div>
              </label>

              <button class="c-icon-btn" aria-label="חברתי" id="btnSocial" title="חברתי">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                  <path d="M7 7a3 3 0 1 0 0 .01M17 7a3 3 0 1 0 0 .01M12 17a3 3 0 1 0 0 .01" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
                  <path d="M9.2 8.5h5.6M8 9.8l2.6 4.7M16 9.8l-2.6 4.7" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></path>
                </svg>
              </button>
            </div>
          </div>
        </nav>

        <!-- Date strip -->
        <div id="dateBlock" class="c-meta-block">
          <p class="c-title--date" id="titleBadge">
            <span id="titleDay"  class="c-title__day">—</span>,
            <span id="titleDate" class="c-title__date">—</span>
          </p>
          <p class="c-subtitle">
            <span class="c-subtitle__hello">ברוכים השבים,</span>
            <strong id="uiName" class="c-subtitle__name">דניאלה</strong>!
            <br><span>מה בלוז היום?</span>
          </p>
        </div>
      </header>

      <!-- view switch -->
      <div class="c-cta-wrap o-inner">
        <div class="c-view-switch" role="group" aria-label="החלפת תצוגה">
          <button id="btnDay"   class="c-headbtn is-active" type="button">יום</button>
          <button id="btnWeek"  class="c-headbtn" type="button">שבוע</button>
          <button id="btnMonth" class="c-headbtn" type="button">חודש</button>
        </div>
      </div>

      <!-- planner -->
      <section id="planner" class="c-planner o-inner" aria-live="polite"></section>

      <!-- Fixed bottom-center orb -->
      <div class="fab-rail">
        <button id="fabCreate" class="btn-create-orb" aria-label="Create new event"></button>
      </div>

      <!-- Fullscreen Event Composer -->
      <section id="eventComposer" class="composer composer--card u-hidden" dir="rtl" aria-hidden="true">
        <button class="composer__backdrop" type="button" data-close aria-label="סגור"></button>
        <div class="composer__panel" role="dialog" aria-modal="true" aria-labelledby="compTitleLabel">
          <header class="composer__header">
            <button class="composer__close" type="button" data-close aria-label="סגור">✕</button>
            <h3 class="composer__title">אירוע חדש</h3>
          </header>

          <form id="composerForm" class="composer__form" autocomplete="off">
            <div class="line" data-step="1">
              <label class="visually-hidden" for="compTitle">תיאור המשימה</label>
              <input id="compTitle" type="text" placeholder="תיאור המשימה…" autocomplete="off" />
              <button id="compMic" class="mic-ico" type="button" aria-pressed="false" title="דבר/י" aria-label="דבר/י">
                <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                  <rect x="9" y="3" width="6" height="12" rx="3" fill="currentColor"></rect>
                  <path d="M6 11v1a6 6 0 0 0 12 0v-1M12 18v3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </button>
              <div id="compMicNote" class="mic-note" aria-live="polite"></div>
            </div>

            <div class="line" data-step="2">
              <label class="visually-hidden" for="compDate">תאריך</label>
              <input id="compDate" type="date" />
            </div>

            <div class="line" data-step="3">
              <label class="visually-hidden" for="compTime">שעה</label>
              <input id="compTime" type="time" />
            </div>

            <div class="composer__actions" aria-hidden="true"></div>
          </form>
        </div>
      </section>

    </div>
  </main>

  <!-- Scripts -->
  <script src="app.js" defer></script>
  <script src="js/logo.js" defer></script>

  <!-- Mark today's row in planner -->
  <script>
    (function () {
      const PLANNER = document.getElementById('planner');
      function markTodayRow() {
        if (!PLANNER) return;
        const d = new Date();
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const token = dd + '.' + mm;

        PLANNER.querySelectorAll('.is-today').forEach(el => el.classList.remove('is-today'));
        PLANNER.querySelectorAll('.p-day__head--flex, .c-week .row').forEach(row => {
          const dateEl = row.querySelector('.p-day__date, .date');
          if (dateEl && (dateEl.textContent || '').trim().startsWith(token)) {
            row.classList.add('is-today');
          }
        });
      }
      document.addEventListener('DOMContentLoaded', markTodayRow);
      if (PLANNER && 'MutationObserver' in window) {
        new MutationObserver(markTodayRow).observe(PLANNER, { childList:true, subtree:true });
      }
    })();
  </script>

  <!-- Focus delegation + helper -->
  <script>
    document.addEventListener('focusin', function(e){
      const row = e.target.closest && e.target.closest('.task-item');
      if (row && e.target === row) {
        const inp = row.querySelector('.task-item__text');
        if (inp) { requestAnimationFrame(()=> inp.focus()); }
      }
    });

    function createTaskRow({id, time, text=''}) {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.tabIndex = 0;
      div.dataset.id = id;

      div.innerHTML = `
        <span class="task-item__time" dir="ltr">${time || ''}</span>
        <input class="task-item__text" type="text" placeholder="תיאור המשימה…" value="${text || ''}">
        <div class="task-item__actions">
          <button class="task-ico task-ico--ok"  title="בוצע" aria-label="בוצע">✓</button>
          <button class="task-ico task-ico--del" title="מחק"  aria-label="מחק">×</button>
        </div>
      `;

      div.addEventListener('click', (ev)=>{
        if (!ev.target.closest('.task-ico')) {
          const inp = div.querySelector('.task-item__text');
          inp && inp.focus();
        }
      });

      div.querySelector('.task-ico--ok') .addEventListener('click', ()=> div.classList.add('is-done'));
      div.querySelector('.task-ico--del').addEventListener('click', ()=> div.remove());

      return div;
    }
  </script>
</body>
</html>
