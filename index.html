<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LooZ</title>
  <script>
    // Apply saved theme before paint (no flash)
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <!-- Global theme (add first so dark mode applies before paint) -->
  <script src="js/theme.js"></script>

  <!-- Optional: base for GitHub Pages -->
  <script>
    (function () {
      if (/github\.io$/.test(location.hostname)) {
        var seg = (location.pathname.split('/').filter(Boolean)[0] || '');
        var base = '/' + (seg ? seg + '/' : '');
        var el = document.createElement('base'); el.href = base;
        document.head.appendChild(el);
      }
    })();
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/dist/main.css" />
  <link rel="stylesheet" href="css/dist/dark-overrides.css" />
  <link rel="stylesheet" href="css/dist/settings.css" />
 <style>
 /* Center composer & panel */
#eventComposer.composer { position: fixed; inset: 0; display: grid; place-items: center; z-index: 9999; }
#eventComposer .composer__backdrop { position: absolute; inset:0; background: rgba(0,0,0,.45); }
#eventComposer .composer__panel{
  position: relative; width:min(92vw,520px);
  background:#f3f4f5; border-radius:18px;
  padding:18px 18px 16px;
  box-shadow:0 22px 60px rgba(0,0,0,.18), 0 1px 0 rgba(255,255,255,.6) inset;
  border:1px solid #e5e7eb;
  color:#0f172a;
}
html[data-theme="dark"] #eventComposer .composer__panel{
  background:#111827; border-color:#1f2937; color:#e5e7eb;
  box-shadow:0 22px 60px rgba(0,0,0,.55);
}
/* --- Header: X on the TOP-LEFT, title on the same line & centered --- */
.composer__header{
  display:grid;
  grid-template-columns:auto 1fr; /* [X] [Title] */
  align-items:center;
  column-gap:8px;
  margin-bottom:8px;
  padding-inline:8px;
}
.composer__title{
  margin:0; font-weight:800; font-size:18px; text-align:center; justify-self:center;
}
.composer__close{
  position:static;              /* inline, not absolute */
  justify-self:start;           /* lock at the left edge */
  width:32px;height:32px;border-radius:12px;
  appearance:none;border:none;cursor:pointer;
  display:grid;place-items:center;
  background:#fff;color:#0f172a;box-shadow:0 8px 20px rgba(2,6,23,.12);
}
html[data-theme="dark"] .composer__close{ background:#111827;color:#f8fafc;box-shadow:0 8px 20px rgba(0,0,0,.35); }

/* Mic is absolutely positioned; JS sets its left/top.
   Keep this so LEFT = X center and translate(-50%,0) centers it perfectly. */
#compMic.mic-ico{ transform: translate(-50%, 0); }


/* --- Pencil cursor INSIDE the panel --- */
#compPencil.pencil-icon{
  position:absolute;             /* panel-relative (panel is position:relative) */
  width:22px; height:22px; z-index:6;
  display:none; pointer-events:none;
  animation:pencil-flicker .9s infinite;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.15));
}

/* --- Mic INSIDE the panel (dead-center above Save) --- */
#compMic.mic-ico{
  position:absolute;             /* panel-relative */
  width:36px; height:36px; border-radius:9999px; z-index:6;
  display:inline-grid; place-items:center; font-size:14px; cursor:pointer;
  background:#fff; color:#0f172a; border:1.5px solid #0f172a;
  box-shadow:0 8px 18px rgba(2,6,23,.14);
  transform:translate(-50%,0);   /* we set left to panel center in JS */
}
#compMic.mic-ico.is-on{ box-shadow:0 0 0 4px rgba(99,102,241,.18); }
html[data-theme="dark"] #compMic.mic-ico{ background:#1f2937; color:#e5e7eb; border-color:#e5e7eb; }

/* Keep the native caret hidden so the pencil is the cursor */
#eventComposer .line input{ caret-color:transparent; }

/* Step reveal (task→date→time). Mic only on step 1 */
#eventComposer .line[data-step]{ display:none; }
#eventComposer[data-step="1"] .line[data-step="1"]{ display:block; }
#eventComposer[data-step="2"] .line[data-step="1"], #eventComposer[data-step="2"] .line[data-step="2"]{ display:block; }
#eventComposer[data-step="3"] .line[data-step]{ display:block; }
#eventComposer[data-step="1"] #compMic{ display:inline-grid; }
#eventComposer:not([data-step="1"]) #compMic{ display:none; }

/* Buttons — pill like your “Reload” */
.c-btn, .btn-create-orb, .p-weekbar__btn, .p-day__count, .c-headbtn, .qp__chip{
  -webkit-tap-highlight-color:transparent; appearance:none; border:none; outline:none; cursor:pointer; user-select:none;
  background:#fff; color:#0f172a;
  padding:10px 16px; border-radius:14px;
  box-shadow:0 8px 20px rgba(2,6,23,.12);
  transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
}
.c-btn:hover, .btn-create-orb:hover, .p-weekbar__btn:hover, .p-day__count:hover, .c-headbtn:hover, .qp__chip:hover{
  transform:translateY(-1px); box-shadow:0 10px 26px rgba(2,6,23,.16);
}
.c-btn:active, .btn-create-orb:active, .p-weekbar__btn:active, .p-day__count:active, .c-headbtn:active, .qp__chip:active{
  transform:none; box-shadow:0 6px 16px rgba(2,6,23,.12);
}
.c-btn--primary{ font-weight:600; }

/* Place the Save button under the mic with Fibonacci spacing (34px) */
#eventComposer .composer__actions{ display:flex; justify-content:center; margin-top:34px; } /* 34px = next Fibonacci */
html[data-theme="dark"] .c-btn, html[data-theme="dark"] .btn-create-orb, html[data-theme="dark"] .p-weekbar__btn,
html[data-theme="dark"] .p-day__count, html[data-theme="dark"] .c-headbtn, html[data-theme="dark"] .qp__chip{
  background:#111827; color:#f8fafc; box-shadow:0 8px 20px rgba(0,0,0,.35);
}

/* Flicker animation */
@keyframes pencil-flicker{
  0%,48%{ opacity:1 }
  49%,100%{ opacity:0 }
}
 </style>

  <script>
    (function () {
      function load(primary, fallback) {
        var s = document.createElement('script');
        s.src = primary; s.defer = true;
        s.onerror = function () {
          var f = document.createElement('script');
          f.src = fallback; f.defer = true;
          document.head.appendChild(f);
        };
        document.head.appendChild(s);
      }
      load('js/auth-guard.js', './auth-guard.js');
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet" />
</head>

<body>
  <main class="o-page">
    <div class="o-phone">

      <!-- Header -->
      <header id="appHeader" class="o-header o-inner">
        <!-- Profile -->
        <button id="btnProfile" class="c-topbtn" type="button" aria-label="פרופיל">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
          </svg>
        </button>

        <!-- 3-dots (settings/menu) -->
        <button id="btnMenu" class="c-topbtn c-topbtn--right" type="button" aria-label="הגדרות">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="5" r="2"></circle>
            <circle cx="12" cy="12" r="2"></circle>
            <circle cx="12" cy="19" r="2"></circle>
          </svg>
        </button>

        <!-- LOGO (dark-aware) -->
        <a class="looz-logo" href="index.html" aria-label="LooZ">
          <!-- light mode -->
          <img class="brand-logo brand-logo--light" src="icons/main-logo.png" alt="LooZ" />
          <!-- dark mode -->
          <img class="brand-logo brand-logo--dark"  src="icons/dark-logo.png"  alt="LooZ" />
        </a>

        <!-- Lemon button (menu toggle) -->
        <button id="lemonToggle" class="c-icon-btn c-icon-btn--lemon" type="button"
                aria-label="פתח/סגור תפריט" aria-expanded="false" aria-controls="appNav">
          <span id="lemonIcon" class="lemon-host" aria-hidden="true"></span>
          <svg class="lemon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet">
            <defs>
              <radialGradient id="lemBody" cx="50%" cy="42%" r="75%">
                <stop offset="0%"  stop-color="#FFF6B8"/>
                <stop offset="48%" stop-color="#FFE067"/>
                <stop offset="100%" stop-color="#F7C843"/>
              </radialGradient>
            </defs>
            <g transform="translate(0,0) scale(1.05)">
              <path d="M19 7c-3-3-8-3-11 0-2 2.3-2 6 0 8 2.2 2.1 5.8 2.4 8 0 2.2-2.1 2.6-5.4 1-7.6"
                    fill="url(#lemBody)" stroke="#B8860B" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M18 6c.9-.9 1.7-1.8 2.3-2.8"
                    stroke="#2E7D32" stroke-linecap="round" stroke-width="2"/>
            </g>
          </svg>
        </button>

        <!-- In-flow NAV -->
        <nav id="appNav" class="c-nav u-is-collapsed" aria-label="ראשי" aria-hidden="true">
          <div class="c-nav__panel" id="navPanel">
            <div class="c-nav__row">
              <button class="c-icon-btn" aria-label="קטגוריות" id="btnCategories" title="קטגוריות">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                  <rect x="3" y="4" width="8" height="16" rx="2"></rect>
                  <rect x="13" y="4" width="8" height="16" rx="2"></rect>
                </svg>
              </button>

              <!-- Search with live suggestions -->
              <label class="c-search" aria-label="חיפוש פעילויות">
                <input id="navSearch" class="c-search__input" type="search" placeholder="חיפוש פעילויות" autocomplete="off"
                       aria-autocomplete="list" aria-expanded="false" aria-controls="sugList" />
                <button id="searchClear" class="c-search__clear" type="button" aria-label="נקה">×</button>
                <button id="searchGo" class="c-search__go" type="button" aria-label="חפש">
                  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="1.5"></circle>
                    <path d="M16 16l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
                  </svg>
                </button>

                <!-- suggestions dropdown -->
                <div id="sugWrap" class="sug-wrap u-hidden" role="listbox" aria-label="הצעות">
                  <div class="sug-head">הצעות</div>
                  <div id="sugList" class="sug-list"></div>
                </div>
              </label>

              <button class="c-icon-btn" aria-label="חברתי" id="btnSocial" title="חברתי">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                  <path d="M7 7a3 3 0 1 0 0 .01M17 7a3 3 0 1 0 0 .01M12 17a3 3 0 1 0 0 .01" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
                  <path d="M9.2 8.5h5.6M8 9.8l2.6 4.7M16 9.8l-2.6 4.7" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></path>
                </svg>
              </button>
            </div>
          </div>
        </nav>

        <!-- Date strip -->
        <div id="dateBlock" class="c-meta-block">
          <p class="c-title--date" id="titleBadge">
            <span id="titleDay"  class="c-title__day">—</span>,
            <span id="titleDate" class="c-title__date">—</span>
          </p>
          <p class="c-subtitle">
            <span class="c-subtitle__hello">ברוכים השבים,</span>
            <strong id="uiName" class="c-subtitle__name">דניאלה</strong>!
            <br><span>מה בלוז היום?</span>
          </p>
        </div>
      </header>

      <!-- view switch -->
      <div class="c-cta-wrap o-inner">
        <div class="c-view-switch" role="group" aria-label="החלפת תצוגה">
          <button id="btnDay"   class="c-headbtn is-active" type="button">יום</button>
          <button id="btnWeek"  class="c-headbtn" type="button">שבוע</button>
          <button id="btnMonth" class="c-headbtn" type="button">חודש</button>
        </div>
      </div>

      <!-- planner -->
      <section id="planner" class="c-planner o-inner" aria-live="polite"></section>

      <!-- Primary CTA at the bottom (static) -->
      <div class="c-primary-cta o-inner">
        <button class="c-cta c-cta--bang btn-create-orb" aria-label="Create new event"></button>
      </div>

      <!-- Bottom Sheet (kept) -->
      <section id="eventSheet" class="c-sheet u-hidden" dir="rtl" aria-hidden="true">
        <button class="c-sheet__backdrop" type="button" data-close aria-label="סגור"></button>
        <div class="c-sheet__panel" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
          <header class="c-sheet__header">
            <h3 id="sheetTitle" class="c-sheet__title">אירוע חדש</h3>
            <button class="c-icon-btn c-icon-btn--ghost" type="button" data-close aria-label="סגור">✕</button>
          </header>

          <form id="sheetForm" class="c-sheet__form">
            <label class="f-field">
              <span class="f-label">כותרת</span>
              <input id="evtTitle" class="f-input" type="text" placeholder="שם האירוע" required>
            </label>

            <div class="f-grid">
              <label class="f-field f-field--icon f-field--elevated">
                <span class="f-label">שעה</span>
                <input id="evtTime" class="f-input f-input--big" type="time" required>
                <span class="f-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="18" height="18">
                    <circle cx="12" cy="13" r="7" fill="none" stroke="currentColor"></circle>
                    <path d="M12 13V9M12 13l3 3" stroke="currentColor" stroke-linecap="round"></path>
                  </svg>
                </span>
              </label>

              <label class="f-field f-field--icon f-field--elevated">
                <span class="f-label">תאריך</span>
                <input id="evtDate" class="f-input f-input--big" type="date" required>
                <span class="f-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="18" height="18">
                    <rect x="3" y="5" width="18" height="16" rx="3" fill="none" stroke="currentColor"></rect>
                    <path d="M3 9h18" stroke="currentColor"></path>
                    <path d="M8 3v4M16 3v4" stroke="currentColor"></path>
                  </svg>
                </span>
              </label>
            </div>

            <div class="qp">
              <div class="qp__row">
                <span class="qp__label">תאריך מהיר:</span>
                <button class="qp__chip" type="button" data-date="today">היום</button>
                <button class="qp__chip" type="button" data-date="tomorrow">מחר</button>
                <button class="qp__chip" type="button" data-date="+2">בעוד יומיים</button>
                <button class="qp__chip" type="button" data-date="nextweek">שבוע הבא</button>
              </div>
              <div class="qp__row">
                <span class="qp__label">שעה מהירה:</span>
                <button class="qp__chip" type="button" data-time="now+30">+30 דק׳</button>
                <button class="qp__chip" type="button" data-time="now+60">+ שעה</button>
                <button class="qp__chip" type="button" data-time="12:00">12:00</button>
                <button class="qp__chip" type="button" data-time="20:00">20:00</button>
              </div>
            </div>

            <div class="c-sheet__actions">
              <button class="c-btn c-btn--primary" type="submit">הוסף</button>
            </div>
          </form>
        </div>
      </section>

      <!-- Fullscreen Event Composer (upgraded) -->
      <section id="eventComposer" class="composer composer--card u-hidden" dir="rtl" aria-hidden="true">
        <button class="composer__backdrop" type="button" data-close aria-label="סגור"></button>

        <div class="composer__panel" role="dialog" aria-modal="true" aria-labelledby="compTitleLabel">
       <header class="composer__header">
  <!-- X stays on the TOP-LEFT, on the SAME LINE as the title -->
  <button class="composer__close" type="button" data-close aria-label="סגור">✕</button>
  <h3 class="composer__title">אירוע חדש</h3>
</header>


      <form id="composerForm" class="composer__form" autocomplete="off">
<div class="line" data-step="1">
  <label class="visually-hidden" for="compTitle">תיאור המשימה</label>
  <input id="compTitle" type="text" placeholder="תיאור המשימה…" autocomplete="off" />
  <img id="compPencil" class="pencil-icon" src="icons/pencil.svg" alt="" aria-hidden="true" />
  <button id="compMic" class="mic-ico" type="button" aria-pressed="false" title="דבר/י" aria-label="דבר/י">
    <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
      <rect x="9" y="3" width="6" height="12" rx="3" fill="currentColor"></rect>
      <path d="M6 11v1a6 6 0 0 0 12 0v-1M12 18v3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </button>
  <div id="compMicNote" class="mic-note" aria-live="polite"></div>
</div>



  <!-- Step 2: Date -->
  <div class="line" data-step="2">
    <label class="visually-hidden" for="compDate">תאריך</label>
    <input id="compDate" type="date" />
  </div>

  <!-- Step 3: Time -->
  <div class="line" data-step="3">
    <label class="visually-hidden" for="compTime">שעה</label>
    <input id="compTime" type="time" />
  </div>

  <div class="composer__actions">
    <button class="c-btn c-btn--primary" type="submit">שמור</button>
  </div>
</form>

        </div>
      </section>

    </div>

  </main>

  <!-- Scripts -->
  <script src="app.js" defer></script>
  <script src="js/logo.js" defer></script>
  <script>
    (function () {
      const PLANNER = document.getElementById('planner');
      function markTodayRow() {
        if (!PLANNER) return;
        const d = new Date();
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const token = dd + '.' + mm;

        PLANNER.querySelectorAll('.is-today').forEach(el => el.classList.remove('is-today'));
        PLANNER.querySelectorAll('.p-day__head--flex, .c-week .row').forEach(row => {
          const dateEl = row.querySelector('.p-day__date, .date');
          if (dateEl && (dateEl.textContent || '').trim().startsWith(token)) {
            row.classList.add('is-today');
          }
        });
      }
      document.addEventListener('DOMContentLoaded', markTodayRow);
      if (PLANNER && 'MutationObserver' in window) {
        new MutationObserver(markTodayRow).observe(PLANNER, { childList:true, subtree:true });
      }
    })();
  </script>
</body>
</html>
