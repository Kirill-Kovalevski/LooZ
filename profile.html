<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LooZ — פרופיל</title>

  <!-- מצב כהה נטען לפני צביעה -->
  <script src="js/theme.js"></script>

  <!-- בסיס ל-GitHub Pages (אופציונלי) -->
  <script>
    (function () {
      if (/github\.io$/.test(location.hostname)) {
        var seg = (location.pathname.split('/').filter(Boolean)[0] || '');
        var base = '/' + (seg ? seg + '/' : '');
        var el = document.createElement('base'); el.href = base;
        document.head.appendChild(el);
      }
    })();
  </script>

  <!-- CSS גלובלי -->
  <link rel="stylesheet" href="css/dist/main.css" />
  <link rel="stylesheet" href="css/dist/settings.css" />
  <link rel="stylesheet" href="css/dist/dark-overrides.css" />
  <script>
  (function () {
    function load(primary, fallback) {
      var s = document.createElement('script');
      s.src = primary; s.defer = true;
      s.onerror = function () {
        var f = document.createElement('script');
        f.src = fallback; f.defer = true;
        document.head.appendChild(f);
      };
      document.head.appendChild(s);
    }
    load('js/auth-guard.js', './auth-guard.js');
  })();
</script>


  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <!-- פרופיל (קומפייל מ-SCSS לקובץ הבא) -->
  <link rel="stylesheet" href="css/dist/profile.css" />
</head>

<body>
<header class="topbar">
  <a class="topbar__brand" href="index.html" aria-label="LooZ">
    <img class="brand-logo brand-logo--light" src="icons/main-logo.png" alt="LooZ">
    <img class="brand-logo brand-logo--dark"  src="icons/dark-logo.png"  alt="LooZ">
  </a>
  <h1 class="topbar__title">פרופיל</h1>
 <button class="topbar__back" type="button" aria-label="חזרה" onclick="history.back()">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
  </svg>
</button>

</header>

 
<main class="o-page">
  <div class="o-phone o-inner">
    <section class="pr-shell">

      <!-- קאבר: לחיץ להעלאה -->
      <button class="pr-cover pr-cover--click" id="prCoverBtn" type="button" aria-label="העלה תמונת רקע">
        <input id="prCoverFile" type="file" accept="image/*" hidden>
      </button>

      <!-- אוואטר: לחיץ להעלאה -->
      <button class="pr-avatar" id="prAvatarBtn" aria-label="עדכון תמונת פרופיל">
        <span id="prAvatar" class="pr-avatar__img" aria-hidden="true"></span>
        <input id="prAvatarFile" type="file" accept="image/*" hidden>
      </button>

      <!-- ...המשך העמוד ללא שינוי... -->


        <!-- שם/ניק/מיקום -->
        <h2 class="pr-name"   id="prName">שם משתמש</h2>
        <p  class="pr-handle" id="prHandle">@user</p>
        <div class="pr-loc"   id="prLocation">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11Zm0-9a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z" fill="currentColor"/>
          </svg>
          <span>תל-אביב, ישראל</span>
        </div>

        <!-- פעולות -->
        <div class="pr-actions" role="group" aria-label="פעולות משתמש">
          <button id="btnFollow"    class="pr-btn pr-btn--primary" type="button" aria-pressed="false">עקוב</button>
          <button id="btnMessage"   class="pr-btn" type="button">הודעה</button>
        </div>

        <!-- חברתי: עוקבים/נעקבים/מנויים -->
        <div class="pr-stats">
          <div class="pr-stat"><strong id="stFollowers">0</strong><span>עוקבים</span></div>
          <div class="pr-stat"><strong id="stFollowing">0</strong><span>נעקבים</span></div>
          <div class="pr-stat"><strong id="stSubscribers">0</strong><span>מנויים</span></div>
          <div class="pr-stat"><strong id="stPosts">0</strong><span>פוסטים</span></div>
        </div>

        <!-- משימות: סה״כ/פתוחות/הושלמו -->
        <h3 class="pr-h">משימות</h3>
        <div class="pr-stats">
          <div class="pr-stat"><strong id="stTotal">0</strong><span>סה״כ משימות</span></div>
          <div class="pr-stat"><strong id="stOpen">0</strong><span>פתוחות</span></div>
          <div class="pr-stat"><strong id="stDone">0</strong><span>הושלמו</span></div>
          <div class="pr-stat"><strong id="stActiveDays">0</strong><span>ימים פעילים</span></div>
        </div>

        <!-- גרף התקדמות -->
        <h3 class="pr-h">התקדמות (14 ימים)</h3>
        <div class="pr-chartbox">
          <canvas id="prChart" width="600" height="220" aria-label="גרף התקדמות שבועי"></canvas>
        </div>

        <!-- הישגים -->
        <h3 class="pr-h">הישגים</h3>
        <ul class="pr-badges" id="prBadges" aria-label="הישגים">
          <!-- ימולאו דינמית -->
        </ul>

        <!-- ביו -->
        <p class="pr-bio" id="prBio">“<em>משפט שהמשתמש בוחר</em>”</p>

        <!-- פעילות אחרונה (דוגמאות) -->
        <h3 class="pr-h">פעילות אחרונה</h3>
        <div class="pr-grid">
          <div class="pr-thumb"><img src="images/recent-1.jpg" alt="" /></div>
          <div class="pr-thumb"><img src="images/recent-2.jpg" alt="" /></div>
          <div class="pr-thumb"><img src="images/recent-3.jpg" alt="" /></div>
        </div>
      </section>
    </div>
  </main>

  <!-- סקריפטים -->
  <script src="js/logo.js" defer></script>
  <script src="profile.js" defer></script>
</body>
</html>
