<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>הגדרות — LooZ</title>

  <!-- global theme (no flash) -->
  <script src="js/theme.js"></script>

  <!-- compiled CSS (not .scss) -->
  <link rel="stylesheet" href="css/dist/settings.css?v=2">
  <link rel="stylesheet" href="css/dist/dark-overrides.css?v=2">
  <script src="js/theme.js"></script>

</head>

<body>
  <main class="s">
<header class="s__header s__header--grid">
  <!-- LEFT: back (bold chevron SVG, perfectly centered) -->
  <a class="s__btn s__btn--gold s__btn--chev" id="sBack" href="index.html" aria-label="חזרה" title="חזרה">
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path d="M14 5L7 12l7 7" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <!-- CENTER: title -->
  <h1 class="s__title s__title--center">הגדרות</h1>

     <!-- LOGO (dark-aware) -->
        <a class="looz-logo" href="index.html" aria-label="LooZ">
          <!-- light mode -->
          <img class="brand-logo brand-logo--light" src="icons/main-logo.png" alt="LooZ" />
          <!-- dark mode -->
          <img class="brand-logo brand-logo--dark"  src="icons/dark-logo.png"  alt="LooZ" />
        </a>
</header>






    <section class="s__group">
      <!-- Your theme.js auto-syncs this checkbox (id=setDark) -->
      <label class="row row--switch">
        <span class="row__left">
          <span class="ic ic-moon" aria-hidden="true"></span>
          <span>מצב כהה</span>
        </span>
        <input type="checkbox" id="setDark" />
      </label>

      <button class="row row--nav" id="btnShare" type="button">
        <span class="row__left">
          <span class="ic ic-share" aria-hidden="true"></span>
          <span>שתף אפליקציה</span>
        </span>
        <span class="chev" aria-hidden="true">›</span>
      </button>

      <button class="row row--nav" id="btnPlan" type="button">
        <span class="row__left">
          <span class="ic ic-star" aria-hidden="true"></span>
          <span>בחר מנוי</span>
        </span>
        <span class="chev" aria-hidden="true">›</span>
      </button>

      <button class="row row--danger" id="btnLogout" type="button">
        <span class="row__left">
          <span class="ic ic-logout" aria-hidden="true"></span>
          <span>התנתק</span>
        </span>
      </button>
    </section>
  </main>

  <!-- Plan modal -->
  <dialog id="planDlg" class="dlg">
    <form method="dialog" class="dlg__panel">
      <header class="dlg__head">
        <h3 class="dlg__title">בחר מנוי</h3>
        <button class="dlg__x" aria-label="סגור">✕</button>
      </header>
      <div class="plans">
        <button class="plan" data-plan="free" type="button">
          <div class="plan__name">Free</div>
          <div class="plan__price">₪0</div>
          <div class="plan__desc">בסיסי</div>
        </button>
        <button class="plan plan--pro" data-plan="pro" type="button">
          <div class="plan__name">Premium</div>
          <div class="plan__price">₪19<span>/חודש</span></div>
          <div class="plan__desc">נעילות זהב, עדיפות ושיתוף</div>
        </button>
      </div>
      <div class="dlg__actions">
        <button class="btn" value="cancel">ביטול</button>
      </div>
    </form>
  </dialog>

  <!-- Logo animation (optional, uses your file) -->
  <script src="js/logo.js" defer></script>

  <!-- Page logic -->
  <script src="js/settings.js" defer></script>

</body>
</html>
